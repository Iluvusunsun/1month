<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ของขวัญของเรา 💖</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#3a2a1e,#1c120c);
    font-family:sans-serif;
    overflow:hidden;
}

/* กล่องหลัก */
.scene{
    perspective:1000px;
}

.box{
    width:380px;
    height:250px;
    position:relative;
    transform-style:preserve-3d;
}

/* ตัวกล่อง */
.base{
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(#c8743c,#9b4e1f);
    border-radius:10px;
    box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* ฝา */
.lid{
    position:absolute;
    width:100%;
    height:90px;
    background:linear-gradient(#e18b4d,#b95a23);
    border-radius:10px 10px 0 0;
    transform-origin:bottom;
    transition:0.7s ease;
}

/* ตอนเปิด */
.open .lid{
    transform:rotateX(-120deg);
}

/* ข้างใน */
.inside{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
    opacity:0;
    transition:0.6s ease;
}

.open .inside{
    opacity:1;
}

/* การ์ดข้างใน */
.card{
    width:110px;
    height:140px;
    background:#fffdf7;
    border-radius:8px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    cursor:pointer;
    overflow:hidden;
    transition:0.4s ease;
}

.card:hover{
    transform:translateY(-8px);
}

/* โน้ตลายเส้น */
.note-mini{
    padding:8px;
    font-size:12px;
    background:repeating-linear-gradient(
        white,
        white 22px,
        #ffdcdc 23px
    );
}

/* รูปเล็ก */
.card img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* popup ลอยขึ้น */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.5);
    opacity:0;
    background:#fffdf7;
    width:90%;
    max-width:420px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 25px 50px rgba(0,0,0,0.7);
    transition:0.5s ease;
    z-index:99;
}

.popup.show{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}

.popup img{
    width:100%;
    border-radius:10px;
}

button{
    margin-top:10px;
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#b95a23;
    color:white;
    cursor:pointer;
}
.nav{
    background:#e18b4d;
}
</style>
</head>

<body>

<div class="scene">
    <div class="box" id="box" onclick="openBox()">
        <div class="lid"></div>
        <div class="base"></div>

        <div class="inside">
            <!-- โน้ต -->
            <div class="card" onclick="showNote(event)">
                <div class="note-mini">
                    ถึงเธอ 💌<br>
                    รักมากนะ...
                </div>
            </div>

            <!-- รูป -->
            <div class="card" onclick="showPhoto(event)">
                <img src="IMG_20260228_210333_242.jpg">
            </div>
        </div>
    </div>
</div>

<!-- popup โน้ต -->
<div class="popup" id="notePopup">
    <h3>ถึงเธอ 💖</h3>
    <p>
        ครบรอบ 1 เดือนแล้วนะ<br>
        ขอบคุณที่เข้ามาในชีวิตเค้า<br>
        ทุกช่วงเวลามีค่ามากจริงๆ 💕
    </p>
    <button onclick="closePopup()">ปิด</button>
</div>

<!-- popup รูป -->
<div class="popup" id="photoPopup">
    <img id="gallery" src="IMG_20260228_210333_242.jpg">
    <br>
    <button class="nav" onclick="prev()">ก่อนหน้า</button>
    <button class="nav" onclick="next()">ถัดไป</button>
    <br>
    <button onclick="closePopup()">ปิด</button>
</div>

<script>
let images=[
"IMG_20260228_210333_242.jpg",
"IMG_20260228_210329_876.jpg",
"IMG_20260228_210320_614.jpg",
"IMG_20260228_210316_770.jpg",
"IMG_20260228_080114_842.jpg",
"IMG_20260228_080112_320.jpg"
];

let index=0;

function openBox(){
    document.getElementById("box").classList.add("open");
}

function showNote(e){
    e.stopPropagation();
    document.getElementById("notePopup").classList.add("show");
}

function showPhoto(e){
    e.stopPropagation();
    document.getElementById("photoPopup").classList.add("show");
}

function closePopup(){
    document.getElementById("notePopup").classList.remove("show");
    document.getElementById("photoPopup").classList.remove("show");
}

function next(){
    index=(index+1)%images.length;
    document.getElementById("gallery").src=images[index];
}
function prev(){
    index=(index-1+images.length)%images.length;
    document.getElementById("gallery").src=images[index];
}
</script>

</body>
</html>
